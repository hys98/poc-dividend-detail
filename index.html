<style>
:root{--bg:#f5f6f8;--card:#fff;--line:#e6e9ee;--line2:#eef1f4;--txt:#16191d;--mut:#6b7280;
--mut2:#9aa1ab;--acc:#2563eb;--accbg:#eff4ff;--up:#0a8f5b;--dn:#d23f31;--chip:#f0f2f5;--warn:#b45309;--warnbg:#fff7ed;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;font-size:14px;line-height:1.5}
.page{max-width:880px;margin:0 auto;padding:18px 18px 80px}
.prevbar{display:flex;align-items:center;gap:10px;background:#1f2430;color:#cfd6e4;border-radius:10px;padding:8px 12px;margin-bottom:18px;font-size:12.5px}
.prevbar b{color:#fff}.prevbar select{margin-left:auto;background:#2b3242;color:#fff;border:1px solid #3a4252;border-radius:7px;padding:5px 8px;font-size:12.5px}
/* stock detail shell (faux) */
.stockhead{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.stockhead .nm{font-size:20px;font-weight:700}.stockhead .meta{color:var(--mut);font-size:13px}
.tabs{display:flex;gap:18px;border-bottom:1px solid var(--line);margin-bottom:20px;font-size:13px}
.tabs span{padding:9px 2px;color:var(--mut2)}.tabs .on{color:var(--txt);font-weight:700;border-bottom:2px solid var(--acc);margin-bottom:-1px}
/* section */
.sec{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.A{padding:16px 20px;border-bottom:1px solid var(--line2);display:flex;align-items:center;flex-wrap:wrap;gap:10px}
.A .t{font-size:17px;font-weight:700}
.badge{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}
.b-pay{background:#e7f6ef;color:var(--up)}.b-nopay{background:#f0f2f5;color:var(--mut)}
.prov{margin-left:auto;display:flex;align-items:center;gap:10px;color:var(--mut);font-size:12px}
.srcbtn{border:1px solid var(--line);background:#fff;color:var(--acc);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer}
.srcbtn:hover{background:var(--accbg)}
.body{padding:18px 20px}
.blocklabel{font-size:12px;font-weight:700;color:var(--mut);letter-spacing:.02em;margin:6px 0 10px;display:flex;align-items:center;gap:8px}
.blocklabel .ln{flex:1;height:1px;background:var(--line2)}
.sharetoggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-left:auto}
.sharetoggle button{border:0;background:#fff;color:var(--mut);padding:4px 10px;font-size:11.5px;cursor:pointer}
.sharetoggle button.on{background:var(--acc);color:#fff}
/* B kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{border:1px solid var(--line);border-radius:11px;padding:12px 13px;background:#fff}
.kpi .k{font-size:11.5px;color:var(--mut);margin-bottom:7px}
.kpi .v{font-size:21px;font-weight:700;letter-spacing:-.01em}
.kpi .u{font-size:12px;color:var(--mut);font-weight:500;margin-left:2px}
.kpi .d{font-size:11.5px;margin-top:5px;color:var(--mut)}
.kpi .read{font-size:11px;color:var(--acc);margin-top:3px;font-weight:600}
.kpilegend{font-size:11.5px;color:var(--mut);margin:0 0 11px}.kpilegend b{color:var(--txt)}
.dpill{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:8px;cursor:default}
.dpill.up{background:#e7f6ef;color:var(--up)}.dpill.dn{background:#fdecea;color:var(--dn)}
.dpill.flat{background:var(--chip);color:var(--mut)}.dpill.mut{background:var(--chip);color:var(--mut2)}
.dpill.new{background:#eef4ff;color:var(--acc)}.dpill.turn{background:#e7f6ef;color:var(--up)}
.kpi .tagq{font-size:10px;color:var(--warn);background:var(--warnbg);padding:1px 6px;border-radius:8px;margin-left:5px}
.kpi .tagc{font-size:10px;color:var(--mut);background:var(--chip);padding:1px 6px;border-radius:8px;margin-left:5px}
.nopaybox{background:#fafbfc;border:1px dashed var(--line);border-radius:11px;padding:18px;text-align:center;color:var(--mut)}
.nopaybox b{color:var(--txt)}
/* shared table (D/E/G) */
table{border-collapse:collapse;width:100%;font-size:12.5px}
.rel{font-size:10.5px;color:var(--mut2);font-weight:400}
/* C trend */
.trend th,.trend td{border-bottom:1px solid var(--line2);padding:8px 10px;text-align:right}
.trend th{color:var(--mut);font-weight:600;font-size:11.5px}
.trend td.l,.trend th.l{text-align:left}
.cmode{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-left:auto;vertical-align:middle}
.cmode button{border:0;background:#fff;color:var(--mut);padding:4px 12px;font-size:11.5px;cursor:pointer}
.cmode button.on{background:var(--acc);color:#fff}
.tchip{font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:9px;white-space:nowrap}
.t-up{background:#e7f6ef;color:var(--up)}.t-dn{background:#fdecea;color:var(--dn)}
.t-flat{background:#eef1f4;color:var(--mut)}.t-mix{background:#eff4ff;color:var(--acc)}
.trend .cup{color:var(--up)}.trend .cdn{color:var(--dn)}
/* generic raw/aux tables */
.gt{margin-top:8px;overflow-x:auto}
.gt table{font-size:12px}.gt th,.gt td{border:1px solid var(--line);padding:5px 8px;text-align:center}
.gt th{background:#f7f9fb;color:var(--mut)}.gt td.l,.gt th.l{text-align:left}
details{border-top:1px solid var(--line2);padding:12px 0 2px}
summary{cursor:pointer;font-weight:600;font-size:13px;color:var(--txt);list-style:none;display:flex;align-items:center;gap:8px}
summary::-webkit-details-marker{display:none}
summary .chev{color:var(--mut2);transition:.15s}details[open] summary .chev{transform:rotate(90deg)}
.txt{white-space:pre-wrap;color:#3a3f46;font-size:12.5px;background:#fafbfc;border:1px solid var(--line2);border-radius:8px;padding:11px 13px;margin-top:10px;max-height:240px;overflow:auto}
.muted{color:var(--mut)}.null{color:var(--mut2)}
.rawwrap{margin-top:8px}
.rawnote{font-size:11.5px;color:var(--mut);margin:4px 0 8px}
.hl{outline:2px solid var(--acc);outline-offset:-2px;background:var(--accbg)!important}
.block{margin-bottom:22px}
@media(max-width:680px){.kpis{grid-template-columns:repeat(2,1fr)}}

"2025년 07월 24일", "2025년 08월 31일", "O", "-"], ["분기배당", "2025년 12월", "O", "2025년 10월 30일", "2025년 11월 30일", "O", "-"], ["결산배당", "2025년 12월", "O", "2026년 01월 29일", "2026년 02월 28일", "O", "-"]], "nh": 1}], "policy_text": "가. 배당 목표 결정시 사용하는 재무지표 및 산출방법\n당사는 주주환원 목표로 '총주주환원율'(TSR, Total Shareholder Return, 이하 'TSR')을 사용하고 있으며, TSR은 (현금배당 총액 + 자기주식 매입 및 소각액)/지배주주귀속 당기순이익으로 산출됩니다.\n\n나. 향후 배당 수준의 방향성 (현행유지/확대/축소 중 기재)\n당사는 주주가치 제고를 위해 가시성 높은 배당 정책을 지속적으로 추진하고 있으며, 현재 배당성향 최소 25%, 보통주 기준 주당 10,000원의 최소배당금의 배당 정책을 실시하고 있습니다. 배당 규모는 향후 회사의 지속적인 성장을 위한 투자와 경영실적 및 Cashflow 상황 등을 전반적으로 고려하여 결정하고 있습니다. 이와 관련하여, 당사는 2017년 1월 25일 공시를 통해 향후 연간 Free Cash Flow의 30~50%를 주주환원 활용 추진 등 '중장기 배당 정책'을 공표한 바 있습니다.\n이후 당사는 더욱 투명한 주주환원 정책을 제공하기 위해 2023년 4월 25일 '중장기 주주환원 정책'을 공시하였습니다. 당사는 배당의 가시성 확대와 안정성 확보를 위해 2023년 2분기부터 분기배당을 실시하고 있으며, 연간 연결 지배주주 순이익 기준 25%이상의 배당성향(우선주 포함)을 달성하였습니다. 또한, 기보유 자사주 중 발행주식수의 3%에 해당하는 물량을 3년간 1%씩 소각하는 등 적극적인 자사주 소각 정책을 통해 주주가치 제고 및 주주 신뢰 강화를 추진하고 있습니다.\n\n또한, 당사는 적극적인 밸류업 프로그램 추진을 통해 한 단계 발전한 주주환원정책을 시행하고자 2024년 8월 28일 '기업가치제고계획'을 공시하였습니다. 이와 관련하여, 당사는 2025년에서 2027년 3년간 평균 ROE 11에서 12%를 지향하여 개선하고, 주주환원 TSR 최소 35% 이상의 목표를 갖고 주주환원을 지속 강화할 예정입니다. 당사 밸류업 프로그램의 중요한 정책은 다음과 같습니다.\n\n① 2024년에는 주당 최소배당금(보통주 기준 10,000원)을 도입하고, 자사주 매입 시 매입 목적을 명시하고, 향후 3년간 자사주(우선주 포함) 매입 총 규모를 4조원으로 설정하였습니다.\n\n② 2025년부터 2027년까지는 분기 배당 2,500원을 시행하고, 우선주 디스카운트를 고려한 자사주 매입 및 소각 정책을 운영할 계획입니다. 세부적인 내용은 해당 공시를 참조하여 주시기 바랍니다.\n당사는 배당 정책과 관련하여 주주가치 제고의 방향성 아래, 배당 가시성과 지속적인 성장을 위한 투자 계획, 경영환경 변화와 관련 법률 동향 등을 종합적으로 고려하여 상시 검토하고 커뮤니케이션할 수 있도록 노력하겠습니다.\n\n다. 배당 제한 관련 정책\n해당 사항 없습니다.", "charter": "가. 정관상 배당절차 개선방안 이행 가부\n\n당사는 기말배당 예측가능성을 제공하고자 2023년 3월 23일 제55기 주주총회에서 기말배당 기준일에 대하여 아래의 내용을 반영하여 당사 정관 제37조를 개정하였습니다.\n(변경 전) 매 결산기말(12.31)\n(변경 후) 이사회에서 정하는 날\n또한, 당사는 분기배당에 대해서도 예측가능성을 제공하기 위해 2025년 3월 20일 제57기 주주총회에서 분기배당 기준일에 대하여 아래의 내용을 반영하여 정관 제37조를 개정하였습니다.\n(변경 전) 매 3월, 6월 및 9월 말일\n(변경 후) 이사회에서 정하는 날\n\n**주요배당지표**\n\n※ 상기 내용은 한국채택국제회계기준에 따라 작성됨.\n※ 상기 (연결)당기순이익은 지배기업소유주지분 기준임.\n※ 제56기 2분기배당금 : 392,887백만원(주당 1,500원)\n※ 제56기 3분기배당금 : 392,887백만원(주당 1,500원)\n※ 제57기 1분기배당금 : 525,760백만원(주당 2,000원)\n※ 제57기 2분기배당금 : 525,770백만원(주당 2,000원)\n※ 제57기 3분기배당금 : 529,918백만원(주당 2,000원)\n※ 제58기 1분기배당금 : 650,733백만원(주당 2,500원)\n※ 제58기 2분기배당금 : 650,742백만원(주당 2,500원)\n※ 제58기 3분기배당금 : 656,631백만원(주당 2,500원).\n※ 상기의 우선주는 2우선주를 기준으로 작성함.\n\n※ 주당순이익 산출내역 (단위 : 백만원)\n\n※ 유통주식수는 기중 자기주식수의 변동으로 인한 발행주식수를 고려하여 가중평균한 주식수임.\n※ (주1) 기업회계기준서 제 1033호 \"주당이익\"에서 규정한 보통주의 정의를 충족하는 구형우선주임.\n\n**과거 배당 이력**\n\n(단위: 회, %)\n\n※ 당사의 결산배당은 공시 정보 기준으로 제32기(1999년)부터 시행하였으며 58기(2025년)까지 연속\n배당 예정임. 제58기 결산배당은 당사 제58기 정기주주총회 상정 안건인 제1호 의안(제58기 재무제표\n승인의 건)으로 상정될 예정이며, 향후 정기주주총회에서 부결되거나 수정이 발생한 경우 정정보고서\n를 통해 그 내용 및 사유 등을 반영할 예정임.\n※ 당사는 제48기(2015년)부터 제52기(2019년)까지 매년 중간배당을 시행해 왔으나,\n제53기(2020년)는 코로나19 사태로 인한 위기 극복과 유동성 확보를 위해 중간배당을 미실시함.\n제54기(2021년)부터 중간배당 재실시하였으며, 56기(2023년) 2분기부터 분기배당 실시함.\n※ 평균 배당수익률은 보통주 기준이며, 단순평균법으로 계산함. 최근 3년은 제56기~제58기,\n최근 5년은 제54기~제58기 기준으로 작성함.", "_raw": {"text_blocks": ["가. 배당 목표 결정시 사용하는 재무지표 및 산출방법\n당사는 주주환원 목표로 '총주주환원율'(TSR, Total Shareholder Return, 이하 'TSR')을 사용하고 있으며, TSR은 (현금배당 총액 + 자기주식 매입 및 소각액)/지배주주귀속 당기순이익으로 산출됩니다.\n\n나. 향후 배당 수준의 방향성 (현행유지/확대/축소 중 기재)\n당사는 주주가치 제고를 위해 가시성 높은 배당 정책을 지속적으로 추진하고 있으며, 현재 배당성향 최소 25%, 보통주 기준 주당 10,000원의 최소배당금의 배당 정책을 실시하고 있습니다. 배당 규모는 향후 회사의 지속적인 성장을 위한 투자와 경영실적 및 Cashflow 상황 등을 전반적으로 고려하여 결정하고 있습니다. 이와 관련하여, 당사는 2017년 1월 25일 공시를 통해 향후 연간 Free Cash Flow의 30~50%를 주주환원 활용 추진 등 '중장기 배당 정책'을 공표한 바 있습니다.\n이후 당사는 더욱 투명한 주주환원 정책을 제공하기 위해 2023년 4월 25일 '중장기 주주환원 정책'을 공시하였습니다. 당사는 배당의 가시성 확대와 안정성 확보를 위해 2023년 2분기부터 분기배당을 실시하고 있으며, 연간 연결 지배주주 순이익 기준 25%이상의 배당성향(우선주 포함)을 달성하였습니다. 또한, 기보유 자사주 중 발행주식수의 3%에 해당하는 물량을 3년간 1%씩 소각하는 등 적극적인 자사주 소각 정책을 통해 주주가치 제고 및 주주 신뢰 강화를 추진하고 있습니다.\n\n또한, 당사는 적극적인 밸류업 프로그램 추진을 통해 한 단계 발전한 주주환원정책을 시행하고자 2024년 8월 28일 '기업가치제고계획'을 공시하였습니다. 이와 관련하여, 당사는 2025년에서 2027년 3년간 평균 ROE 11에서 12%를 지향하여 개선하고, 주주환원 TSR 최소 35% 이상의 목표를 갖고 주주환원을 지속 강화할 예정입니다. 당사 밸류업 프로그램의 중요한 정책은 다음과 같습니다.\n\n① 2024년에는 주당 최소배당금(보통주 기준 10,000원)을 도입하고, 자사주 매입 시 23년 12월 31일", "X", "-"]], "nh": 1}], "policy_text": "※ 상기 '(연결)주당순이익(원)'은 기본주당순이익을 기재하였습니다.\n\n(단위: 회, %)", "charter": "당사는 당사 정관에 의거하여, 금전 및 금전 외의 재산으로 이익배당이 가능합니다.\n\n또한, 당사는 상법 제462조 따른 배당가능이익 한도 내에서, 경영 환경을 고려하여 이익 배분을 통한 주주 환원정책과 내부 유보를 통한 재무 건전성 유지정책을 적절히 시행하고자 합니다.\n\n당사의 경우, 현재 재무구조 상 배당가능이익이 발생하지 않는 상황이며, 향후 회사의 배당정책이나 목표 배당성향에 대하여 구체적인 수치로 제시하지 못하는 상황입니다.\n\n이에 당사는, 주주 친화적인 배당정책의 시행과 기업가치 증대를 위하여, 핵심 사업인 세포치료제 개발 사업에 대한 경쟁력을 확보하고 지속적인 수익 창출을 위한 미래성장동력을 확보하고자 합니다. 또한 제22기 정기 주주총회(2024.03.29)에서 정관 변경을 통해 분기 배당의 근거를 마련하였으며, 제23기 정기 주주총회(2025.03.31)에서 자본잉여금을 감액하여 결손금을 보전하고 이익잉여금으로의 전입을 통해 배당여력의 기초를 다지고 장기적인 주주환원정책을 시행하고자 합니다.\n\n1) 정관상 배당절차 개선방안 이행 가부\n\n3) 배당에 관련한 규정(당사 정관)\n\n제37조 (이익금의 처분) 매기 총수입금에서 총지출금을 공제한 잔액을 이익금으로 하여 이를 다음과 같이 처분한다. 1. 이익준비금 2. 별도적립금 3. 주주배당금 4. 임원상여금 5. 후기이월금 6. 기타\n\n제38조 (이익배당) ① 이익배당금은 매결산기에 있어서의 주주명부에 기재된 주주 또는 질권자에게 지급한다. ② 이익배당은 금전과 금전 외의 재산으로 할 수 있다. 단, 주식에 의한 배당은 이익배당총액의 2분의 1에 상당하는 금액을 초과할 수 없다.\n③ 이익배당은 주주총회의 결의로 정한다. 다만, 제36조 제3항 따라 재무제표를 이사회가 승인하는 경우 이사회 결의로 이익배당을 한다.\n\n제38조의 2 (분기배당) ① 회사는 이사회의 결의로 사업연도 개시일부터 3월, 6월 및 9월의 말일(이하 “분기배당 기준일”이라 한다)의 주주에게 분기배당을 할 수 있다. ② 제1항의 이사회 결의는 분기배당 기준일 이후 45일 내에 하여야 한다. ③ 분기배당은 직전결산기의 대차대조표상의 순자산액에서 다음 각호의 금액을 공제한 액을 한도로 한다. 1. 직전결산기의 자본금의 액 2. 직전결산기까지 적립된 자본준비금과 이익준비금의 합계액 3. 직전결산기의 정기주주총회에서 이익배당하기로 정한 금액 4. 직전결산기까지 정관의 규정 또는 주주총회의 결의에 의하여 특정목적 을 위해 적립한 임의준비금", "_raw": {"text_blocks": ["당사는 당사 정관에 의거하여, 금전 및 금전 외의 재산으로 이익배당이 가능합니다.\n\n또한, 당사는 상법 제462조 따른 배당가능이익 한도 내에서, 경영 환경을 고려하여 이익 배분을 통한 주주 환원정책과 내부 유보를 통한 재무 건전성 유지정책을 적절히 시행하고자 합니다.\n\n당사의 경우, 현재 재무구조 상 배당가능이익이 발생하지 않는 상황이며, 향후 회사의 배당정책이나 목표 배당성향에 대하여 구체적인 수치로 제시하지 못하는 상황입니다.\n\n이에 당사는, 주주 친화적인 배당정책의 시행과 기업가치 증대를 위하여, 핵심 사업인 세포치료제 개발 사업에 대한 경쟁력을 확보하고 지속적인 수익 창출을 위한 미래성장동력을 확보하고자 합니다. 또한 제22기 정기 주주총회(2024.03.29)에서 정관 변경을 통해 분기 배당의 근거를 마련하였으며, 제23기 정기 주주총회(2025.03.31)에서 자본잉여금을 감액하여 결손금을 보전하고 이익잉여금으로의 전입을 통해 배당여력의 기초를 다지고 장기적인 주주환원정책을 시행하고자 합니다.", "1) 정관상 배당절차 개선방안 이행 가부", "2) 배당액 확정일 및 배당기준일 지정 현황", "3) 배당에 관련한 규정(당사 정관)\n\n제37조 (이익  배당기준일을 배당액 결정 이후로 정할 수 있는지 여부", "O", "-"], ["배당절차 개선방안 이행 관련 향후 계획", "배당절차 개선방안 관련 정관을 개정하였으며 배당기준일은 매년 결산 시점에 변경 여부를 결정할 계획", "-"]], "nh": 1}, {"kind": "배당기준일 지정 현황", "grid": [["구분", "결산월", "배당여부", "배당액 확정일", "배당기준일", "배당 예측가능성 제공여부", "비고"], ["결산배당", "2023년 12월", "X", "2024년 02월 02일", "2023년 12월 31일", "X", "-"], ["결산배당", "2024년 12월", "O", "2025년 02월 07일", "2024년 12월 31일", "X", "-"], ["결산배당", "2025년 12월", "O", "2026년 02월 10일", "2025년 12월 31일", "X", "-"]], "nh": 1}], "policy_text": "당사는 주주이익 극대화를 위하여 회사이익의 일정부분을 주주에게 환원하는 배당정책을 실시하고 있습니다. 배당의 규모는 당사의 사업계획을 기준으로 미래 전략사업을 위한 투자, 적정수준의 현금 확보 등 제반 여건을 고려하여 전략적으로 결정하고 있습니다. 향후에도 당사는 미래의 성장과 이익의 주주 환원을 균형있게 고려하여 배당을 실시할 계획입니다.\n\n주1) 상기 표의 당기 현금배당금은 정기주주총회 승인 전으로 향후 정기주주총회에서 부결되거나 수정이 발생한 경우 정정보고서를 통해 그 내용 및 사유 등을 반영할 예정입니다.\n주2) 당기 '(연결)현금배당성향(%)'은 지배기업 소유주지분 기준 당기순이익에 대한 현금배당총액의 비율을 백분율로 기재했습니다.\n주3) 당기 '현금배당수익률(%)'은 배당기준일(2025년 12월 31일) 2매매거래일 전일부터 과거 1주일간의 시장에서 형성된 최종가격의 산술평균한 주가를 사용했습니다.\n\n(단위: 회, %)\n\n주1) 당사는 2004년부터 2019년까지(배당기준일 기준) 연속으로 결산배당을 지급하였습니다. 2020년부터 2023년까지 미지급 유보 배당금에 대한 소급 적용으로 2024년에 결산배당을 지급하기로 결정하였습니다.\n주2) 2025년 결산배당사항이 주주총회에서 부결되는 경우 결산배당 횟수와 평균 배당수익률이 정정될 수 있습니다.\n\n주3) 평균 배당수익률은 단순평균법으로 계산하였습니다.", "charter": "가. 정관상 배당절차 개선방안 이행 가부\n\n당사는 정관 제13조1항, 제43조 및 제44조에서 이익의 배당에 관해 다음과 같이 규정하고 있습니다.\n\n제13조(주주명부의 폐쇄 및 기준일)\n\n① 이 회사는 의결권을 행사하거나 배당을 받을 자 기타 주주 또는 질권자로서 권리를 행사할 자를 정하기 위하여 이사회 결의로 일정한 기간을 정하여 주주명부의 기재변경을 정지하거나 일정한 날에 주주명부에 기재된 주주 또는 질권자를 그 권리를 행사할 주주 또는 질권자로 볼 수 있다.\n\n② 이 회사가 제1항의 기간 또는 날을 정하는 경우 3개월을 경과하지 아니하는 일정한 기간을 정하여 권리에 관한 주주명부의 기재변경을 정지하거나, 3개월내로 정한 날에 주주명부에 기재되어 있는 주주를 그 권리를 행사할 주주로 할 수 있다.\n\n③ 회사가 제1항의 기간 또는 날을 정한 때에는 그 기간 또는 날의 2주 전에 이를 공고하여야 한다.\n\n※ 주식·사채 등의 전자등록에 관한 법률에 따라 주식등을 전자등록한 경우 주주명부 폐쇄기간이 불필요하므로 기준일 제도만으로 운영할 수도 있음.\n\n제43조(이익배당)\n① 이익의 배당은 금전과 주식으로 할 수 있다.\n② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다.\n③ 제1항의 배당은 이사회 결의로 정하는 배당기준일 현재의 주주명부에 기재된 주주 또는 등록된 질권자에게 지급한다.\n※ 제13조1항에 따라 정한 정기주주총회의 기준일과 다른날로 배당기준일을 정할 수 있음.\n④ 이익배당은 주주총회의 결의로 정한다. 다만, 제41조 제6항에 따라 재무제표를 이사회가 승인하는 경우 이사회 결의로 이익배당을 정한다.\n\n제44조(배당금지급청구권의 소멸시효)\n① 배당금의 지급청구권은 5년간 이를 행사하지 아니하면 소멸 시효가 완성한다.\n② 제1항의 시효의 완성으로 인한 배당금은 이 회사에 귀속한다.", "_raw": {"text_blocks": ["당사는 주주이익 극대화를 위하여 회사이익의 일정부분을 주주에게 환원하는 배당정책을 실시하고 있습니다. 배당의 규모는 당사의 사업계획을 기준으로 미래 전략사업을 위한 투자, 적정수준의 현금 확보 등 제반 여건을 고려하여 전략적으로 결정하고 있습니다. 향후에도 당사는 미래의 성장과 이익의 주주 환원을 균형있게 고려하여 배당을 실시할 계획입니다.", "가. 정관상 배당절차 개선방안 이행 가부", "나. 배당액 확정일 및 배당기준일 지정 현황", "주1) 당기 결산배당의 배당액은 2026년 03월 30일 개최 예정인 제82기 정기주주총회를 통해 확정될 예정이며, 정기주주총회에서 부결되거나 수정이 발생한 경우 정정보고서를 통해 그 내용 및 사유 등을 반영할 예정입니다.", "당사는 정관 제13조1항, 제43조 및 제44조에서 이익의 배당에 관해 다음과 같이 규정하고 있습니다.\n\n제13조(주주명부의 폐쇄 및 기준일)\n\n① 이 회사는 의결권을 행사하거나 배당을 받을 자 기타 주주 또는 질권자로서 권리를 행사할 자를 정하기 위하여 이사회 결의로 일정한 기간을 정하여 주주명부의 기재변경을 정지하거나 일정한 날에 주주명부에 기재된 주주 또는 질권자를 그 권리를 행사할 주주 또는 질권자로 볼 수 있다.\n\n② 이 회사가 제1항의 기간 또는 날을 정하는 경우 3개월을 경과하지 아니하는 일정한 기간을 정하여 권리에 관한 주주명부의 기재변경을 정지하거나, 3개월내로 정한 날에 주주명부에 기재되어 있는 주주를 그 권리를 행사할 주주로 할 수 있다.\n\n③ 회사가 제1항의 기간 또는 날을 정한 때에는 그 기간 또는 날의 2주 전에 이를 공고하여야 한다.\n\n※ 주식·사채 등의 전자등록에 관한 법률에 따라 주식등을 전자등록한 경우 주주명부 폐쇄기간이 불필요하므로 기준일 제도만으로 운영할 수도 있음.\n\n제43조(이익배당)\n① 이익의 배당은 금전과 주식으로 할 수 있다.\n② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다.\n③ 제1항의 배당은 이사회 결의로 정하는 배당기준일 현재의 주주명부에 기재된 주주 또는 등록된 질권자에게 지급한다.\n※ 제13조1항에 따라 정한 정기주주총회의 기준일과 다른날로 배당기준일을 정할 수 있음.\n④ 이익배당은 주주총회의 결의로 정한다. 다만, 제41조 제6항에 따라 재무제표를 이사회가 승인하는 경우 이사회 결의로 이익배당을 정한다.\n\n제44조(배당금지급청구권의 소멸시효)\n① 배당금의 지급청구권은 5년간 이를 행사하지 아니하면 소멸 시효가 완성한다.\n② 제1항의 시효의 완성으로 인한 배당금은 이 회사에 귀속한다.", "주1) 상기 표의 당기 현금배당금은 정기주주총회 승인 전으로 향후 정기주주총회에서 부결되거나 수정이 발생한 경우 정정보고서를 통해 그 내용 및 사유 등을 반영할 예정입니다.\n주2) 당기 '(연결)현금배당성향(%)'은 지배기업 소유주지분 기준 당기순이익에 대한 현금배당총액의 비율을 백분율로 기재했습니다.\n주3) 당기 '현금배당수익률(%)'은 배당기준일(2025년 12월 31일) 2매매거래일 전일부터 과거 1주일간의 시장에서 형성된 최종가격의 산술평균한 주가를 사용했습니다.", "(단위: 회, %)", "주1) 당사는 2004년부터 2019년까지(배당기준일 기준) 연속으로 결산배당을 지급하였습니다. 2020년부터 2023년까지 미지급 유보 배당금에 대한 소급 적용으로 2024년에 결산배당을 지급하기로 결정하였습니다.\n주2) 2025년 결산배당사항이 주주총회에서 부결되는 경우 결산배당 횟수와 평균 배당수익률이 정정될 수 있습니다.\n\n주3) 평균 w, 재무구조, 배당 안정성 등을 종합적으로 고려하여 배당을 결정할 계획입니다. 당사는 정관에 의거하여 이사회 결의 및 주주총회의 승인을 통하여 금전과 주식으로 이익배당 할 수 있습니다. 2025년에는 당사가 기 보유하고 있는 자사주(643,797주)를 소각했으며, 추가로 206억원(304,176주) 규모의 신탁계약체결을 통한 자사주 매입 및 소각을 진행하였습니다. 세부사항은 2025년 02월 06일자 '주식소각결정', '주요사항보고서(자기주식신탁계약체결결정)', 2025년 02월 17일자 '주요사항보고서(감자결정)'와 2025년 07월 24일자 '주식소각결정(정정)', 2025년 08월 07일 '주요사항보고서(자기주식취득신탁계약해지결정)'를 참고하시기 바랍니다.\n\n② 제1항의 배당은 제18조에서 정한 날 현재의 주주명부에 기재된 주주 또는 등록된 질권자에게 지급한다. ③ 이익의 배당을 주식으로 하는 경우 주주총회의 결의에 따라 보통주식에 배당할 신주를 보통주식 또는 종류주식으로 할 수 있으며, 종류주식에 배당할 신주는 그와 같은 종류주식으로 한다.\n\n① 회사는 사업연도 개시일부터 3월, 6월 및 9월말일 현재의 주주에게 자본시장과 금융투자업에 관한 법률 제165조의12에 의한 분기배당을 할 수 있다. 분기배당은 금전으로 한다. ② 제1항의 분기배당은 이사회의 결의로 하되, 그 결의는 제1항의 기준일 이후 45일 내에 하여야 한다.\n\n③ 분기배당은 직전결산기의 대차대조표상의 순자산액에서 다음 각호의 금액을 공제한 금액을 한도로 한다.\n\n④ 사업년도 개시일 이후 제1항의 기준일 이전에 신주를 발행한 경우 (준비금의 자본전입, 주식배당, 전환사채의 전환청구, 신주인수권부사채의 신주인수권행사의 경우를 포함한다)에는 분기배당에 관해서는 당해 신주는 제14조의 규정을 준용한다. ※정관 제14조(동등배당) 당 회사는 배당기준일 현재(전환된 경우를 포함함다)된 동종 주식에 대하여 발행일에 관계없이 모두 동등하게 배당한다.\n\n※ (연결)당기순이익은 연결포괄손익계산서상 지배기업의 소유주지분에 귀속된 당기순이익(손실)을 기재하였습니다. ※ (연결)주당순이익은 연결포괄손익계산서상 지배기업의 소유주지분에 귀속된 당기순이익(손실)을 회계기간의 가중평균 유통주식수로 나누어 주당순이익(손실)을 산정합니다. ※ (연결)현금배당성향은 (연결)당기순이익 대비 현금배당금총액입니다. 당기 배당금은 HD현대인프라코어 배당금이 포함되었으며, HD현대인프라코어 (연결)당기순이익 142,571백만원 합산 고려 시 배당성향은 13.06%입니다.", "charter": "", "_raw": {"text_blocks": ["당사의 배당은 배당가능이익 범위 내에서 회사의 이익규모, 미래 성장을 위한 투자 계획 및 재무구조 등을 종합적으로 감안하여 결정하고 있으며, 배당성향 30% 이상 추진(별도 손익계산서상 당기순이익)을 배당정책으로 하고 있습니다. 이에 따라 주주가치 제고 및 주주환원 확대를 위해 투자, Cash Flow, 재무구조, 배당 안정성 등을 종합적으로 고려하여 배당을 결정할 계획입니다. 당사는 정관에 의거하여 이사회 결의 및 주주총회의 승인을 통하여 금전과 주식으로 이익배당 할 수 있습니다. 2025년에는 당사가 기 보유하고 있는 자사주(643,797주)를 소각했으며, 추가로 206억원(304,176주) 규모의 신탁계약체결을 통한 자사주 매입 및 소각을 진행하였습니다. 세부사항은 2025년 02월 06일자 '주식소각결정', '주요사항보고서(자기주식신탁계약체결결정)', 2025년 02월 17일자 '주요사항보고서(감자결정)'와 2025년 07월 24일자 '주식소각결정(정정)', 2025년 08월 07일 '주요사항보고서(자기주식취득신탁계약해지결정)'를 참고하시기 바랍니다.", "① 이익의 배당은 금전, 주식 및 기타의 재산으로 할 수 있다.", "② 제1항의 배당은 제18조에서 정한 날 현재의 주주명부에 기재된 주주 또는 등록된 질권자에게 지급한다. ③ 이익의 배당을 주식으로 하는 경우 주주총회의 결의에 따라 보통주식에 배당할 신주를 보통  목표 결정시 사용하는 재무지표 및 산출방법 당사는 배당 결정시 당기순이익과 시가 등을 종합적으로 고려하여 배당금액을 결정하고 있으며, 2026년 3월 24일 개최 예정인 제5기 정기주주총회에서 결정될 결산배당을 포함하여 최근 3개년 중 배당을 2회 지급하였습니다. 주당 배당액은 시가 대비 약 0.1%, 당기순손실을 기록한 25년 결산배당을 제외한 연결 기준 배당성향은 약 12% 수준입니다. (2) 향후 배당 수준의 방향성\n\n당사는 향후 배당가능이익 범위 내에서 회사의 지속적인 성장을 위한 투자 및 주주 가치 제고, 대내외 경영 환경 등을 고려하여 배당 수준을 결정할 계획입니다. (3) 배당 제한 관련 정책\n\n당사의 배당 수준은 성장동력 확보를 위한 신규 투자계획, 경영 환경, 경기 불확실성 등에 따라 변동될 수 있습니다.\n\n주1) 당사는 2023년 6월 29일 임시주주총회에서 결산 배당기준일을 이사회결의일로 결정할 수 있도록 정관을 개정하였습니다.\n\n당사의 배당에 관한 중요한 정책, 배당의 제한에 관한 사항 등은 다음과 같이 당사 정관에서 규정하고 있습니다.\n\n주1) 당기(제5기)는 당기순손실을 기록하여 현금배당성향(%) 기재를 생략합니다.", "charter": "", "_raw": {"text_blocks": ["(1) 배당 목표 결정시 사용하는 재무지표 및 산출방법 당사는 배당 결정시 당기순이익과 시가 등을 종합적으로 고려하여 배당금액을 결정하고 있으며, 2026년 3월 24일 개최 예정인 제5기 정기주주총회에서 결정될 결산배당을 포함하여 최근 3개년 중 배당을 2회 지급하였습니다. 주당 배당액은 시가 대비 약 0.1%, 당기순손실을 기록한 25년 결산배당을 제외한 연결 기준 배당성향은 약 12% 수준입니다. (2) 향후 배당 수준의 방향성", "당사는 향후 배당가능이익 범위 내에서 회사의 지속적인 성장을 위한 투자 및 주주 가치 제고, 대내외 경영 환경 등을 고려하여 배당 수준을 결정할 계획입니다. (3) 배당 제한 관련 정책", "당사의 배당 수준은 성장동력 확보를 위한 신규 투자계획, 경영 환경, 경기 불확실성 등에 따라 변동될 수 있습니다.", "주1) 당사는 2023년 6월 29일 임시주주총회에서 결산 배당기준일을 이사회결의일로 결정할 수 있도록 정관을 개정하였습니다.", "당사의 배당에 관한 중요한 정책, 배당의 제한에 관한 사항 등은 다음과 같이 당사 정관에서 규정하고 있습니다.", "주1) 당기(제5기)는 당기순손실을 기록하여 현금배당성향(%) 기재를 생략합니다.", "주1) 평균 배당수익률은 비상장으로 시가가 형성되지 않아 산출불가한 기간은 제외한 수치로, 최근 3년간 및 최근 5년간 평균 배당수익률은 2023년(제3기), 2024년(제4기), 2025년(제5기) 배당수익률을 산술평균한 수치입니다. 주2) 배당수익률 : 2025년(제5기) 0.1%, 2024년(제4기) 0.0%(무배당), 2023년(제3기) 0.1%, 2022년(제2기) 산출불가(비상장), 2021년(제1기) 산출불가(비상장)"], "tables": [[["구분", "결산배당", "분기ㆍ중간배당"], ["정관상 배당액 결정 기관", "주주총회", "주주총회"], ["정관상 배당기준일을 배당액 결정 이후로 정할 수 있는지 여부", "O", "O"], ["배당절차 개선방안 이행 관련 향후 계획", "-", "-"]], [["구분", "결산월", "배당여부", "배당액 확정일", "배당기준일", "배당 예측가능성 제공여부", "비고"], ["결산배당", "2025년 12월", "O", "2026년 03월 24일", "2026년 03월 31일", "O", "-"], ["결산배당", "2024년 12월", "X", "-", "-", "O", "-"], ["결산배당", "2023년 12월", "O", "2024년 03월 25일", "2024년 03월 29일", "O", "-"]], [["정관 조항", "내용"], ["제13조(동등배당)", "이 회사는 배당 기준일 현재 발행(전환된 경우를 포함한다)된 동종 주식에 대하 그룹은 금융당국이 권고하는 최소자본비율, 불확실한 미래경기상황에 대응하기 위한 추가 자본, 그리고 금융기관으로서의 유동성 공급 역할 등을 종합적으로 감안하여 보통주자본비율 관리 목표를 설정하고, 주주 입장에서 예측 가능하고 신뢰성 있는 배당정책을 지속적으로 추진하기 위해 연말 결산시점 보통주자본비율에 따른 구간별 총 주주환원율 정책을 시행 중 입니다. ※ 보통주자본비율 구간별 총 주주환원율(현금배당 및 자사주매입/소각 등 포함)\n\n주) 단, 급격한 금융환경의 변화, 감독당국의 규제 및 법률 등 제한, 기타 주주환원에 제약사항이 있는 경우 달리 적용하거나, 정책의 변화가 있을 수 있습니다. (2) 배당제한에 관한 사항 - 해당사항 없음\n\n※ 제13기(2023년) 결산배당부터 「글로벌 스탠더드에 부합하는 배당절차 개선방안」에 따라 배당을 실시하고 있으며, 향후에도 개선된 배당절차를 준수할 계획입니다. (2) 배당액 확정일 및 배당기준일 지정 현황\n\n(1) 결산배당 관련 정관의 내용 당사는 배당금액을 보고 투자여부를 결정할 수 있도록 배당절차를 개선하기 위하여 2023.03.30 제12기 정기주주총회에서 정관 변경을 통해 이사회의 결의로 배당기준일을 정할 수 있도록 하였습니다. *정관 제55조(이익배당) ① 이익의 배당은 금전과 주식으로 할 수 있다. ② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다. ③ 이 회사는 이사회결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다. (2) 분기배당 관련 정관의 내용 자본시장과 금융투자업에 관한 법률 개정에 따라 당사는 2025.03.26 개최되는 제14기 정기주주총회에 분기배당 관련 정관 개정의 건을 상정하여 변경하였습니다.\n\n① 이 회사는 사업연도 개시일부터 3월, 6월, 9월 말일부터 45일 이내의 이사회 결의로써 금전으로 자본시장과 금융투자업에 관한 법률 제165조의12에 의한 분기배당을 할 수 있다.\n\n② 이 회사는 이사회 결의로써 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다.", "charter": "", "_raw": {"text_blocks": ["(1) 중장기 주주환원정책(배당정책) iM금융그룹은 금융당국이 권고하는 최소자본비율, 불확실한 미래경기상황에 대응하기 위한 추가 자본, 그리고 금융기관으로서의 유동성 공급 역할 등을 종합적으로 감안하여 보통주자본비율 관리 목표를 설정하고, 주주 입장에서 예측 가능하고 신뢰성 있는 배당정책을 지속적으로 추진하기 위해 연말 결산시점 보통주자본비율에 따른 구간별 총 주주환원율 정책을 시행 중 입니다. ※ 보통주자본비율 구간별 총 주주환원율(현금배당 및 자사주매입/소각 등 포함)", "자세한 내용은 2024.10.28 공시한 당사의 '기업가치 제고 계획' 및 '이행현황' 을 참고하시기 바랍니다.", "주) 단, 급격한 금융환경의 변화, 감독당국의 규제 및 법률 등 제한, 기타 주주환원에 제약사항이 있는 경우 달리 적용하거나, 정책의 변화가 있을 수 있습니다. (2) 배당제한에 관한 사항 - 해당사항 없음", "(3) 자사주 매입/소각 계획 당사는 2024.10.28 공시한 기업가치 제고 계획에서 2027년까지 자사주 1,500억원 수준 매입ㆍ소각 계획을 발표하였습니다. 공시서류 작성기준일까지 자사주 매입ㆍ소각 600억원을 완료하였고, 공시서류 작성기준일과 공시서류 제출일 사이 추가적으로 400억원 규모의 자사주 매입 계획을 공시 후 현재 신탁계약을 통해 취득 중이며, 상반기 이내 매입 완료 후 1개월 이내 전량 소각할 예정입니다.(아래 관련공시 참조)", "※ 제13기(2023년) 결산배당부터 「글로벌 스탠더드에 부합하는 배당절차 개선방안」에 따라 배당을 실시하고 있으며, 향후에도 개선된 배당절차를 준수할 계획입니다. (2) 배당액 확정일 및 배당기준일  주당 배당금 17,500원(중간 10,000원, 기말 7,500원), 2025년에는 배당의 예측가능성 제고를 위하여 2025년 11월 이사회 결의를 통해 주당 배당금과 배당기준일을 사전 확정하였으며, 2025년 실적 수준 및 재무 여건 등을 감안하여 기말 배당금을 1주당 20,000원으로 결정하였습니다.\n\n또한 제52기 정기주주총회에 안정적인 분기배당 재원 확보를 위하여 임의적립금 약 9,177억원을 미처분이익잉여금으로 전환하는 안건을 상정하였으며, 동 안건이 승인될 경우 향후 3개년(2026~2028년) 동안 주당 15,000원의 분기배당 지급이 가능할 것으로 예상하고 있습니다.\n\n향후에도 중장기 재무목표 범위 내에서 안정적인 배당 기조를 유지하되, 경영실적, 현금창출력, 투자계획 및 대내외 경영환경 변화를 종합적으로 고려하여 배당 수준을 합리적으로 조정해 나갈 예정입니다. 보다 구체적인 중장기 배당 정책은 2026년 기업가치 제고 계획 관련 공시 등을 통해 지속적으로 시장과 소통할 예정입니다. (3) 배당 제한 관련 정책\n\n당사는 2025년 3월 28일 개최된 제51기 정기주주총회에서 '先배당ㆍ後투자' 도입을 위한 정관 변경을 결의하여 배당액 확정 이후 배당받을 주주가 결정되도록 배당 절차를 개선하였습니다. 제51기 정기주주총회 결의를 통해 변경된 배당 관련 정관의 주요 내용은 다음과 같습니다.", "charter": "", "_raw": {"text_blocks": ["(1) 배당 목표 결정시 사용하는 재무지표 및 산출방법 당사는 2024년 10월 기업가치 제고계획 공시 및 2025년 9월 기업가치 제고계획 이행현황 공시 등을 통해 2024년~2026년 3개년 평균 연결기준 총주주환원율 40% 이상을 유지하고, 재무건전성과 주주환원의 균형을 고려하여 유보율 8,000% 이하 유지를 목표로 하는 주주환원정책을 수립ㆍ공개하였습니다. 배당 규모는 연결 및 별도 기준의 당기순이익, 영업활동 현금흐름 및 잉여현금흐름, 재무구조와 중장기 투자계획을 종합적으로 고려하여 산정하며, 배당 및 자기주식 소각을 포함한 총주주환원율 수준을 함께 점검하여 이사회 및 주주총회 결의를 통해 결정하고 있습니다. 2025 사업연도 기말배당의 경우, 주주환원 강화를 위한 정책 기조와 함께 세법 개정에 따른 고배당 상장기업 배당소득 분리과세 특례 적용 요건 등을 종합적으로 고려하여 주당 20,000원으로 결정하였습니다.", "당사는 배당 및 자기주식 소각 등을 종합적으로 고려한 총주주환원율 기준의 주주환원 정책을 일관되게 유지하고 있으며, 배당의 예측가능성과 안정성 제고를 중요한 원칙으로 삼고 있습니다.", "2023년 8월 최초로 중간배당을 실시하였으며, 2023년 주당 배당금 15,000원(중간 10,000원, 기말 5,000원), 2024년 주당 배당금 17,500원(중간 10,000원, 기말 7,500원), 2025년에는 배당의 예측가능성 제고를 위하여 2025년 11월 이사회 결의를 통해 주당 배당금과 배당기준일을 사전 확정하였으며, 2025년 실적 수준 및 재무 여건 등을 감안하여 기말 배당금을 1주당 20,000원으로 결정하였습니다.", "또한 제52기 정기주주총회에 안정적인 분기배당 재원 확보를 위하여 임의적립금 약 9,177억원을 미처분이익잉여금으로 전환하는 안건을 상정하였으며, 동 안건이 승인될 경우 향후 3개년(2026~2028년) 동안 주당 15,000원의 분기배당 지급이 가능할 것으로 예상하고 있습니다.", "향후에도 중장기 재무목표 범위 내에서 안정적인 배당 기조를 유지하되, 경영실적, 현금창출력, 투자계획 및 대내외 경영환경 변화를 종합적으로 고려하여 배당 수준을 합리적으로 조정해 나갈 예정입니다. 보다 구체적인 중장기 배당 정책은 2026년 기업가치 제고 계획 관련 공시 등을 통해 지속적으로 시장과 소통할 예정입니다. (3) 배당 제한 관련 정책", "해당사항 없음", "당사는 2025년 3월 28일 개최된 제51기 정기주주총회에서 '先배당ㆍ後투자' 도입을 위한 정관 변경을 결의하여 배당액 확정 이후 배당받을 주주가 결정되도록 배당 절차를 개선하였습니다. 제51기 정기주주총회 결의를 통해 변경된 배당 관련 정관의 주요 내용은 다음과 같습니다.", "제42조 (이익배당) ① 이익의 배당은 금전, 주식 및 기타의 재산으로 할 수 있다.", "② 본 회사는 이사회 결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다.", "③ 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다.", "④ 배당금의 지급청구권은 5년간 이를 행사하지 아니하면 소멸시효가 완성되며 미지급배당금에는 이자를 가산하지 아니한다.", "⑤ 제4항의 시효의 완성으로 인한 배당금은 본 회사에 귀속한다. 제42조의2 (분기배당) ① 본 회사는 사업연도 개시일부터 3월, 6월 및 9월말일부터 45일 이내의 이사회 결의로써 금전으로 자본시장과 금융투자업에 관한 법률 제165조의12에 의한 분기배당을 할 수 있다.", "② 본 회사는 이사회 결의로써 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다.", "③ 분기배당은 직전결산기의 대차대조표상의 순자산액에서 다음 각호의 금액을 공제한 액을 한도로 한다.", "4. 직전결산기까지 정관의 규정 또는 주주총회의 결의에 의하여 특정목적을 위해 적립한       임의준비금", "④ 삭제", "⑤ 분기배당을 할 때에는 제8조의 우선주식에 대하여도 보통주식과 동일한 배당률을 적용한다.", "주) 당기 현금배당금은 정기주주총회 승인 전 금액으로, 향후 정기주주총회에서 부결되거나 수정이 발생한 경우 정정보고서를 통해 그 내용 및 사유 등을 반영할 예정입니다.", "주) 결산배당은 1988년(제15기)부터 연속 배당 중이며, 평균 배당수익률은 최근 3년, 5년간의 배당수익률의 합을 3과 5로 나누는 단순평균법으로 계산하였습니다."], "tables": [[["구분", "결산배당", "분기ㆍ중간배당"], ["정관상 배당액 결정 기관", "주주총회", "이사회"], ["정관상 배당기준일을 배당액 결정 이후로 정할 수 있는지 여부", "O", "O"], ["배당절차 개선방안 이행 관련 향후 계획", "-", "-"]], [["구분", "결산월", "배당여부", "배당액 확정일", "배당기준일", "배당 예측가능성 제공여부", "비고"], ["결산배당", "2025.12", "O", "2025.11.05", "2025.12.31", "O", "-"], ["결산배당", "2024.12", "O", "2025.03.13", "2024.12.31", "X", "-"], ["분기배당", "2024.06", "O", "2024.08.07", "2024.06.30", "X", "-"], ["결산배당", "2023.12", "O", "2024.02.19", "2023.12.31", "X", "-"], ["분기배당", "2023.06", "O", "2023.08.10", "2023.06.30", "X", "-"]], [["제42조 (이익배당) ① 이익의 배당은 금전, 주식 및 기타의 재산으로 할 수 있다. ② 본 회사는 이사회 결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다. ③ 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다. ④ 배당금의 지급청구권은 5년간 이를 행사하지 아니하면 소멸시효가 완성되며 미지급배당금에는 이자를 가산하지 아니한다. ⑤ 제4항의 시효의 완성으로 인한 배당금은 본 회사에 귀속한다. 제42조의2 (분기배당) ① 본 회사는 사업연도 개시일부터 3월, 6월 및 9월말일부터 45일 이내의 이사회 결의로써 금전으로 자본시장과 금융투자업에 관한 법률 제165조의12에 의한 분기배당을 할 수 있다. ② 본 회사는 이  대량생산을 통한 매출과 수익을 바탕으로 미래의 성장동력 확보를 위한 내부유보와 이익의 주주환원을 균형 있게 고려한 배당을 실시하여 주주가치를 극대화해 가겠습니다.\n\n당사는 현재 결손금 누적으로 인하여 배당을 지급하고 있지 않지만 향후 이익 발생으로 인한 결손금 해소 및 이익잉여금 적립 시 구체적 배당계획을 수립할 예정입니다.\n\n[배당 관련 정관의 내용] 제42조 (이익금의 처분) 이 회사는 매 사업년도 이익금(이월이익잉여금 포함)을 다음과 같이 처분한다.\n\n6. 차기이월이익잉여금 제43조 (이익배당) ① 이익의 배당은 금전, 주식 및 기타의 재산으로 할 수 있다.\n\n② 제1항의 배당은 매 결산기 말 현재의 주주명부에 기재된 주주 또는 등록된 질권       자에게 지급한다.\n\n제43조의2 (중간배당) ① 이 회사는 7월 1일 0시 현재의 주주에게 상법 제462조의 3에 의한 중간배당을         할 수 있다.", "charter": "", "_raw": {"text_blocks": ["가. 배당 목표 결정시 사용하는 재무지표 및 산출방법 당사는 법률상 배당가능이익 한도 내에서 사업 환경의 변화, 향후 투자계획 및 재무안정성 등을 종합적으로 고려하여 배당금액을 결정하고 있습니다. 배당가능이익이 있는 경우 향후 투자계획과 회사의 현금흐름 등을 종합적으로 검토하여 배당을 적극적으로 추진하는 등 주주환원을 받을 주주의 권리를 존중하기 위해 노력하고 있습니다. 다만 2018년 현금배당 지급(주당 80원, 배당수익률 3.3%) 이후 상법상 배당가능이익이 없어 현금배당을 실시하지 못하였으며, 이차전지 사업 등 신규사업에 대한 대규모 투자가 진행되고 있어 원활한 투자 진행을 위해서 전액 유보하고 있습니다. 이차전지 대량생산을 통한 매출과 수익을 바탕으로 미래의 성장동력 확보를 위한 내부유보와 이익의 주주환원을 균형 있게 고려한 배당을 실시하여 주주가치를 극대화해 가겠습니다.", "당사는 현재 결손금 누적으로 인하여 배당을 지급하고 있지 않지만 향후 이익 발생으로 인한 결손금 해소 및 이익잉여금 적립 시 구체적 배당계획을 수립할 예정입니다.", "[배당 관련 정관의 내용] 제42조 (이익금의 처분) 이 회사는 매 사업년도 이익금(이월이익잉여금 포함)을 다음과 같이 처분한다.", "6. 차기이월이익잉여금 제43조 (이익배당) ① 이익의 배당은 금전, 주식 및 기타의 재산으로 할 수 있다.", "② 제1항의 배당은 매 결산기 말 현재의 주주명부에 기재된 주주 또는 등록된 질권       자에게 지급한다.", "제43조의2 (중간배당) ① 이 회사는 7월 1일 0시 현재의 주주에게 상법 제462조의 3에 의한 중간배당을         할 수 있다.", "② 제1항의 중간배당은 이사회의 결의로 하되, 그 결의는 제1항의 기준일 이후 45        일 내에 하여야 한다.", "③ 중간배당은 직전결산기의 대차대조표상의 순자산액에서 다음 각 호의 금액을          공제한 액 을 한도로 한다.", "5. 직전결산기까지 정관의 규정 또는 주주총회의 결의에 의하여 특정목적을 위해         적립한 임의준비금", "④ 사업년도 개시일 이후 제1항의 기준일 이전에 신주를 발행한 경우(준비금의 자        본전입, 주식배당, 전환사채의 전환청구, 신주인수권부사채의 신주인수권 행사        의 경우를 포함한다) 에는 중간배당에 관해서는 당해 신주는 직전사업년도 말에       발행된 것으로 본다. 제44조 (배당금 지급청구권의 소멸시효) ① 배당금의 지급청구권은 5년간 이를 행사하지 아니 하면 소멸시효가 완성한다.", "② 제1항의 시효의 완성으로 인한 배당금은 이 회사에 귀속한다.", "[주요배당지표]", "※ 당사는 최근 5개년 간 배당이력이 없습니다."], "tables": [[["구분", "결산배당", "분기ㆍ중간배당"], ["정관상 배당액 결정 기관", "이사회", "이사회"], ["정관상 배당기준일을 배당액 결정 이후로 정할 수 있는지 여부", "X", "X"], ["배당절차 개선방안 이행 관련 향후 과 주식으로 할 수 있다. ② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다. ③ 이 회사는 이사회결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다. 제45조의2 (중간배당) ① 이 회사는 이사회 결의로 상법 제462조의3에 의한 중간배당을 할 수 있다. 중간배당은 금전으로 한다. ② 이 회사는 이사회 결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다. ③  중간배당은 직전결산기의 대차대조표상의 순자산액에서 다음 각호의 금액을 공제한 액을 한도로 한다. 1. 직전결산기의 자본의 액 2. 직전결산기까지 적립된 자본준비금과 이익준비금의 합계액 3. 직전결산기의 정기주주총회에서 이익배당하기로 정한 금액 4. 직전결산기까지 정관의 규정 또는 주주총회의 결의에 의하여 특정목적을 위해 적립한 임의준비금 5. 중간배당에 따라 당해 결산기에 적립하여야 할 이익준비금 제46조 (배당금지급 청구권의 소멸시효) ① 배당금의 지급청구권은 5년간 이를 행사하지 아니하면 소멸시효가 완성한다. ② 제1항의 시효의 완성으로 인한 배당금은 본 회사에 귀속한다.\n\n당사는 적극적인 주주환원을 통해 주주가치 제고를 추구한다는 기본 원칙을 가지고 있으며, 이에 따라 회사의 배당정책을 운영하고 있습니다. 당사의 세부 배당정책은 아래와 같습니다.\n\n2. 향후 배당 수준의 방향성 [2025년 4월 11일, 기업가치 제고계획 발표] - 배당성향: 중장기 30%이상으로 확대 - 최저배당 : 보통주 600원, 우선주 650원 - 기간 및 재검토 시점 : 매 3년(2025년 ~ 2027년 사업연도) ※ 주주환원정책은 주주의 예측가능성을 제고하기 위하여 정책 지속기간을 3년으로 설정하였으며, 환경 변화를 반영하기 위하여 동기간 이후 본 정책을 재검토할 예정입니다. ※ 또한, 정책 적용기간 내 유의미한 시장환경 변화 시, 이사회 논의를 거쳐 주주가치 제고를 위한 방안을 마련할 수 있습니다. [동원시스템즈 배당정책 2025년~2027년] - 배당성향 30% 이하 수준에서 배당총액 결정(별도 당기순이익 기준) - 최저배당 2025년부터 시행(보통주 600원, 종류주식(우선주) 650원) - 중간배당 2025년부터 시행\n\n※상기 46기 현금배당수익률(%)은 현금ㆍ현물배당 결정 이사회결정일의 직전 매매거래일부터 과거 1주일간('26.2.2 ~ '26.2.9)의 거래소시장에서 형성된 최종가격의 산술평균가격(보통주 28,691원, 우선주 17,028원)에 대한 1주당 배당금의 비율임. ※제46기(2025년) 1주당 연간 총 배당금 내역 (중간배당 포함) - 연간 총 배당금: 보통주 600원, 종류주식(우선주) 650원 - 중간배당금: 보통주 300원, 종류주식(우선주) 350원 (※ 우선주 추가배당분 선지급) - 결산배당금: 보통주 300원, 종류주식(우선주) 300원\n\n※ 평균 배당수익률 : 제46기 결산배당 1.0%, 제46기 중간배당 1.0%, 제45기 1.7%, 제44기 1.8%, 제 43기 1.4%, 제42기 1.2% ※ 평균배당수익률은 보통주를 기준으로하여 기업공시서식 작성기준에 맞추어 산출하였습니다. ※ 연속 배당횟수 및 평균 배당수익률은 최근 제46기를 포함하여 산출하였습니다. ※ 연속 배당횟수는 2015년 3월 26일 제35기 정기주주총회에서 승인된 현금배당을 기준으로  산출하였습니다.", "charter": "", "_raw": {"text_blocks": ["' 가. 배당에 관한 사항 당사는 다음과 같이 회사정관에 배당에 관한 사항을 정하였고, 본 정관에 따라 배당하고 있습니다. ' 제10조의4 (동등배당) 이 회사는 배당 기준일 현재 발행(전환된 경우를 포함한다)된 동종 주식에 대하여 발행일에 관계 없이 모두 동등하게 배당한다. 제45조 (이익배당) ① 이익의 배당은 금전과 주식으로 ", "2023년 12월", "X", "-", "-", "X", "-"]], [["제55조(이익배당) ① 이익의 배당은 금전과 주식으로 할 수 있다. ② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다. ③ 제1항의 배당은 매결산기말 현재의 주주명부에 기재된 주주 또는 등록된 질권자에게 지급한다. 제55조의2(분기배당) ① 이 회사는 사업년도 개시일로부터 3월, 6월 및 9월 말일 현재의 주주에게 자본시장과금융투자업에관한법률 제165조의 12에 의한 분기배당을 할 수 있다. 분기배당은 금전과 주식으로 할 수 있다. ② 제1항의 분기배당은 이사회의 결의로 하되, 그 결의는 제1항의 기준일 이후 45일 내에 하여야 한다. ③ 분기배당은 직전결산기의 대차대조표상의 순재산액에서 다음 각호의 금액을 공제한 액을 한도로 한다. 1. 직전결산기의 자본금의 액 2. 직전결산기까지 적립된 자본준비금과 이익준비금의 합계액 3. 직전결산기의 정기주주총회에서 이익배당하기로 정한 금액 4. 직전결산기까지 정관의 규정 또는 주주총회의 결의에 의하여 특정목적을 위해 적립한 임의준비금 5. 분기배당에 따라 당해 결산기에 적립하여야 할 이익준비금 6. 당해 영업년도 중에 분기배당이 있었던 경우 그 금액의 합계액 7. 상법시행령 제18조에서 정한 미실현이익 ④ 사업년도개시일이후 제1항의 기준일이전에 신주를 발행한 경우(준비금의 자본전입, 주식배당, 전환사채의 전환청구, 신주인수권부사채의 신주인수권 행사의 경우를 포함)에는 분기배당에 관해서는 당해 신주는 직전사업년도말에 발행된 것으로 본다. ⑤ 분기배당을 할 때에는 제8조의2의 우선주식에 대하여도 보통주식과 동일한 배당률을 적용한다. 제56조(배당금지급청구권의 소멸시효) ① 배당금의 지급청구권은 5년간 이를 행사하지 아니하면 소멸시효가 완성한다. ② 제1항의 시효의 완성으로 인한 배당금은 이 회사에 귀속한다."]], [["구   분", "주식의 종류", "당기", "전기", "전전기"], ["제78기", "제77기", "제76기"], ["주당액면가액(원)", "200", "200", "500"], ["(연결)당기순이익(백만원)", "-45,766", "-12,275", "-84,482"], ["(별도)당기순이익(백만원)", "-51,124", "-19,757", "-59,440"], ["(연결)주당순이익(원)", "-1,001", "-268", "-1,848"], ["현금배당금총액(백만원)", "-", "-", "-"], ["주식배당금총액(백만원)", "-", "-", "-"], ["(연결)현금배당성향(%)", "-", "-", "-"], ["현금배당수익률(%)", "보통주", "-", "-", "-"], ["-", "-", "-", "-"], ["주식배당수익률(%)", "보통주", "-", "-", "-"], ["-", "-", "-", "-"], ["주당 현금배당금(원)", "보통주", "-", "-", "-"], ["-", "-", "-", "-"], ["주당 주식배당(주)", "보통주", "-", "-", "-"], ["-", "-", "-", "-"]], [["", "(단위: 회, %)"]], [["연속 배당횟수", "평균 배당수익률"], ["분기(중간)배당", "결산배당", "최근 3년간", "최근 5년간"], ["-", "-", "-", "-"]]]}}, {"company": "롯데물산", "source": "mhtml", "report_kind": "사업보고서", "fiscal_year": "제44기", "section_path": "mhtml(DART viewer) → 배당에 관한 사항", "dividend": true, "periods": ["제44기", "제43기", "제42기"], "metrics": {"par_value": {"제44기": "5,000", "제43기": "5,000", "제42기": "5,000"}, "net_income_consol": {"제44기": "-315,053", "제 록 지속적으로 노력하겠습니다. 3) 배당 제한 관련 정책 공시 제출일 현재 배당 제한에 관한 정책은 없으며, 배당에 관하여는 시장상황 및 규제환경, 회사의 경영상 목적 등에 의해 실시할 예정입니다.\n\n당사는 제54기 정기주주총회(2023.03.23)에서 정관을 개정하여 배당액이 확정된 이후에 배당을 받을 주주가 결정될 수 있도록 배당절차를 개선하였습니다.\n\n주1) 연결당기순이익은 지배기업소유주지분 순이익임 주2) 연결실체의 관계기업인 미래에셋생명보험의 회계정책 변경효과 등을 고려하여, 연결실체의 비교 표시된 과거 연결재무제표를 소급재작성함 주3) 상기 현금배당수익률(%)은 배당에 관한 이사회결의일(2026년 2월 24일) 직전 매매거래일부터 과거 1주일간의 유가증권시장에서 형성된 최종가격의 산술평균가격에 대한 1주당 배당금의 백분율임 주4) 1우선주는 '미래에셋증권우'이며, (구)정관 하에서 발행한 주식이므로 (구)정관에 의거하여 배당함 주5) 2우선주는 '미래에셋증권2우B'임 주6) 상기 주식배당금 총액은 액면가액*주식배당으로 발행할 주식의 총수로 산정한 수치임\n\n주2) 우선주 평균 배당수익률 - 미래에셋증권우 : 최근 3년간 3.7%, 최근 5년간 4.4% - 미래에셋증권2우B : 최근 3년간 3.7%, 최근 5년간 4.5% [주식배당]\n\n주2) 우선주 평균 배당수익률 - 미래에셋증권우 : 최근 3년간 -8.7%, 최근 5년간 -8.7%\n\n※  상기 배당에 관한 사항 내용 중 당기(제57기) 내용은 주주총회 승인 전 내용이며, 향후 정기주주총회에서 배당 관련 안건이 부결되거나 수정이 발생하여 내용이 변경되는 경우 정정보고서를 통해 그 내용 및 사유 등을 반영할 예정임.", "charter": "", "_raw": {"text_blocks": ["1) 배당 목표결정 시 사용하는 재무지표 및 산출방법 당사는 정관에 의거 이사회 및 주주총회 결의를 통해 12월말 기준 결산 이익배당을 매년 실시하고 있습니다. 배당금 산정 시 당기순이익을 감안하고 있으며, 2024년 2월 공시한 중장기 주주환원정책에 따라 실시한 배당은 과거 3개년 동안 35%이상의 주주환원율을 유지했습니다. ※주주환원율 : 조정 당기순이익 기준(연결재무제표 지배주주 기준) 2) 향후 배당 수준의 방향성 당사는 주주가치 제고와 주주환원 확대를 최우선 목표로, 배당가능이익범위 내에서 당해년도 이익수준, 경영환경 등을 종합적으로 고려하여 그 수준을 결정하고 있습니다. 연간 배당 규모는 매년 초 이사회에서 결정한 후, 정기 주주총회 개최 전 공시를 통하여 주주에게 안내하고 있습니다. 앞으로도 시장 및 사업환경 변화를 감안하여 주주가치 제고를 위한 주주환원정책을 적극적으로 시행할 수 있도록 지속적으로 노력하겠습니다. 3) 배당 제한 관련 정책 공시 제출일 현재 배당 제한에 관한 정책은 없으며, 배당에 관하여는 시장상황 및 규제환경, 회사의 경영상 목적 등에 의해 실시할 예정입니다.", "당사는 제54기 정기주주총회(2023.03.23)에서 정관을 개정하여 배당액이 확정된 이후에 배당을 받을 주주가 결정될 수 있도록 배당절차를 개선하였습니다.", "주1) 연결당기순이익은 지배기업소유주지분 순이익임 주2) 연결실체의 관계기업인 미래에셋생명보험의 회계정책 변경효과 등을 고려하여, 연결실체의 비교 표시된 과거 연결재무제표를 소급재작성함 주3) 상기 현금배당수익률(%)은 배당에 관한 이사회결의일(2026년 2월 24일) 직전 매매거래일부터 과거 1주일간의 유가증권시장에서 형성된 최종가격의 산술평균가격에 대한 1주당 배당금의 백분율임 주4) 1우선주는 '미래에셋증권우'이며, (구)정관 하에서 발행한 주식이므로 (구)정관에 의거하여 배당함 주5) 2우선주는 '미래에셋증권2우B'임 주6) 상기 주식배당금 총액은 액면가액*주식배당으로 발행할 주식의 총수로 산정한 수치임", "주1) 상기 평균 배당수익률은 보통주(미래에셋증권) 기준임", "주2) 우선주 평균 배당수익률 - 미래에셋증권우 : 최근 3년간 3.7%, 최근 5년간 4.4% - 미래에셋증권2우B :  "분기ㆍ중간배당"], ["정관상 배당액 결정 기관", "이사회", "-"], ["정관상 배당기준일을 배당액 결정 이후로 정할 수 있는지 여부", "X", "-"], ["배당절차 개선방안 이행 관련 향후 계획", "현행유지", "-"]], "nh": 4}, {"kind": "배당기준일 지정 현황", "grid": [["구분", "결산월", "배당여부", "배당액 확정일", "배당기준일", "배당 예측가능성 제공여부", "비고"], ["결산배당", "2025년 12월", "O", "2026.03.27", "2025.12.31", "X", "주주총회 결의 예정"], ["결산배당", "2024년 12월", "O", "2025.03.28", "2024.12.31", "X", "주주총회 결의"], ["결산배당", "2023년 12월", "O", "2024.03.27", "2023.12.31", "X", "주주총회 결의"]], "nh": 4}], "policy_text": "당사의 배당시기와 배당금액은 이사회결의와 주주총회 승인을 통하여 최종 결정되며지급대상은 매 회계연도 종료일 현재 주주명부에 등재된 주주에게 배당을 실시하고 있습니다. 당기말 현재 회사 내부적으로 명문화된 배당정책은 없습니다. 다만, 주주이익 극대화를 위해 이익의 일정부분을 주주에게 환원하는 수단으로 배당 및 자사주 매입을 실시하고 있습니다. 현금배당 및 자사주 매입규모는 미래 사업투자와 무차입경영, 일정수준의 현금보유원칙을 우선적으로 달성한 후 경영성과와 현금흐름을 감안해 지속 가능한 수준에서 결정하고 있습니다. 따라서 향후 배당수준의 방향성은 현행유지를 기본으로 경영성과에 따라 조정될 전망입니다.\n\n(주1) 정관상 배당액 결정기관은 이사회이나, 주주총회에서 결정하고 있음 (주2) 제56기 결산배당의 경우 정기주주총회에서 부결 또는 수정시 정정보고서를 통해 그 내용과 사유 등을 반영할 예정입니다.\n\n당사는 현금배당을 원칙으로 하고 있으며, 배당금에 대한 권리는 그 권리가 5년간 행사되지 않는 경우 시효는 소멸되며, 시효기간이 완성된 이후 청구되지 않은 배당금은회사에 귀속되는 것을 원칙으로 하고 있습니다. 당사는 공시대상기간 중에 현금배당 이외의 주식배당이나 현물배당을 실시한 사실이없으며, 주주간에 차등배당을 실시한 적도 없습니다. 당사는 당기말 현재 자본시장과 금융투자업에 관한 법률과 상법에서 허용하고 있는 분기배당 또는 중간배당 제도를 도입하고 있지 않습니다. 배당의 제한에 관한 사항으로는 이익잉여금 중 법정적립금인 이익준비금 2,032백만원과 미처분이익잉여금 중 재평가적립금 3백만원이 있습니다. 동 잉여금들은 현금배당재원으로 사용될 수 없으며, 자본전입 및 결손보전을 위해서만 사용할 수 있습니다 그 외의 이익잉여금은 조세특례제한법이 규정하는 바에 따라 환입되는 경우 임의적립금으로 이입하여 배당재원으로 사용할 수 있습니다.\n\n상기 표의 제56기 현금배당금은 정기주주총회 승인전 금액으로 향후 정기주주총회에서 부결되거나 수정이 발생할 경우 정정보고서를 통해 그 내용 및 사유 등을 반영할 예정입니다.\n\n주당순이익은 기본주당순이익으로 한국채택국제회계기준 제1033호에 따라 연결포괄손익계산서의『지배기업소유주지분당기순이익』을『가중평균유통보통주식수』로 나누어 산출하였습니다. (주2) 현금배당수익률 계산내역\n\n현금배당수익률은『1주당 현금배당금』을『배당기준일 전전거래일(배당부종가일)부터 과거 1주일간 공표된 매일의 증권시장에서 형성된 최종시세가격의 산술평균가격』으로 나누어 산출하였습니다.", "charter": "", "_raw": {"text_blocks": ["당사의 배당시기와 배당금액은 이사회결의와 주주총회 승인을 통하여 최종 결정되며지급대상은 매 회계연도 종료일 현재 주주명부에 등재된 주주에게 배당을 실시하고 있습니다. 당기말 현재 회사 내부적으로 명문화된 배당정책은 없습니다. 다만, 주주이익 극대화를 위해 이익의 일정부분을 주주에게 환원하는 수단으로 배당 및 자사주 매입을 실시하고 있습니다. 현금배당 및 자사주 매입규모는 미래 사업투자와 무차 으며, 배당 수준을 결정함에 있어 배당성향, 주당배당금 수준, 현금흐름 및 재무상태 등을 종합적으로 고려하고 있습니다. 또한 회사의 재무건전성 유지, 중장기 투자계획, 국제적인 경영환경 변화 등을 함께 고려하여 안정적인 주주환원을 실시하고자 노력하고 있습니다.\n\n나. 향후 배당 수준의 방향성 당사는 앞으로도 주주가치 제고를 위한 안정적 배당정책을 지속 실시할 예정입니다. 현재 배당 성향 수준에 대한 변동 계획은 없으나, 향후 배당정책 등에 변동이 발생할 경우, 공시를 통해 관련 내용을 안내할 예정입니다.\n\n다. 배당 제한 관련 정책 당사는 공시서류 작성기준일 현재 배당을 제한하는 별도의 내부 정책이나 정관상의 제한 규정은 없습니다.\n\n① 이익의 배당은 금전과 주식, 기타의 재산으로 할 수 있다. ② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다. ③ 본 회사는 이사회 결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다. 2) 배당금 지급 청구권의 소멸시효(정관 제49조)\n\n① 배당금의 지급 청구권은 5년간 이를 행사하지 아니하면 소멸시효가 완성된다. ② 제1항의 시효의 완성으로 인한 배당금은 본 회사에 귀속한다.\n\n* 회사는 설립 후 매 기(제1기 ~ 제9기) 결산배당을 했습니다. ** 상기 평균배당수익률은 최근 3년(제9기 ~ 제7기), 최근 5년(제9기 ~ 제5기) 배당수익률의 단순 평균입니다.", "charter": "", "_raw": {"text_blocks": ["가. 배당 목표 결정시 사용하는 재무지표 및 산출방법 당사는 당기 연결재무제표상의 이익을 기준으로 배당정책을 수립하고 있으며, 배당 수준을 결정함에 있어 배당성향, 주당배당금 수준, 현금흐름 및 재무상태 등을 종합적으로 고려하고 있습니다. 또한 회사의 재무건전성 유지, 중장기 투자계획, 국제적인 경영환경 변화 등을 함께 고려하여 안정적인 주주환원을 실시하고자 노력하고 있습니다.", "나. 향후 배당 수준의 방향성 당사는 앞으로도 주주가치 제고를 위한 안정적 배당정책을 지속 실시할 예정입니다. 현재 배당 성향 수준에 대한 변동 계획은 없으나, 향후 배당정책 등에 변동이 발생할 경우, 공시를 통해 관련 내용을 안내할 예정입니다.", "다. 배당 제한 관련 정책 당사는 공시서류 작성기준일 현재 배당을 제한하는 별도의 내부 정책이나 정관상의 제한 규정은 없습니다.", "① 이익의 배당은 금전과 주식, 기타의 재산으로 할 수 있다. ② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다. ③ 본 회사는 이사회 결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다. 2) 배당금 지급 청구권의 소멸시효(정관 제49조)", "① 배당금의 지급 청구권은 5년간 이를 행사하지 아니하면 소멸시효가 완성된다. ② 제1항의 시효의 완성으로 인한 배당금은 본 회사에 귀속한다.", "주요배당지표", "* 회사는 설립 후 매 기(제1기 ~ 제9기) 결산배당을 했습니다. ** 상기 평균배당수익률은 최근 3년(제9기 ~ 제7기), 최근 5년(제9기 ~ 제5기) 배당수익률의 단순 평균입니다."], "tables": [[["구분", "결산배당", "분기ㆍ중간배당"], ["정관상 배당액 결정 기관", "이사회", "이사회"], ["정관상 배당기준일을 배당액 결정 이후로 정할 수 있는지 여부", "O", "O"], ["배당절차 개선방안 이행 관련 향후 계획", "제9기 정기주주총회에서 배당절차를 개선함", "제9기 정기주주총회에서 배당절차를 개선함"]], [["구분", "결산월", "배당여부", "배당액 확정일", "배당기준일", "배당 예측가능성 제공여부", "비고"], ["결산배당", "2025.12", "O", "2026.03.2 2월 31일", "X", "-"]], "nh": 4}], "policy_text": "회사의 배당정책은 적정한 이익분배를 통한 기업가치 극대화를 목표로 하고 있으며,주주들의 배당에 대한 기대에 부응할 수 있는 안정된 배당정책을 유지하기 위하여 최선을 다하고 있습니다. 매 사업연도 종료 후 법률 상 배당가능이익과 주식의 시장가치 및 동종 업체의 배당규모, 당사 Cashflow 상황 등을 종합적으로 고려하여 적정한 배당이 이루어질 수 있도록 노력하고 있습니다.\n\n제9조의2(이익배당 또는 잔여재산분배에 관한 종류주식) ① 회사는 이익배당 또는 잔여재산분배에 관한 종류주식(이하 이 조에서 '종류주식'이라 한다)을 발행할 수 있다.\n\n③ 종류주식에 대하여는 우선배당 한다. 종류주식에 대한 우선배당은 1주의 금액 기준 연 1% 이상으로 발행시에 이사회가 정한 배당률에 따라현금으로 지급한다.\n\n④ 종류주식에 대하여 제3항에 따른 배당을 하고 보통주식에 대하여 종류주식의 배당률과 동률의 배당을 한 후, 잔여배당가능이익이 있으면 보통주식과 종류주식에 대하여 동등한 비율로 배당한다.\n\n⑤ 종류주식에 대하여 제3항에 따른 배당을 하지 못한 사업연도가 있을 경우에는 미배당분을 누적하여 다음 사업연도의 배당시에 우선하여 배당한다.\n\n⑥ 회사가 청산하는 경우 종류주식은 잔여재산분배에 대하여 종류주식발행총액과 미지급된 배당금을 합한 금액의 한도에서 보통주식에 우선하여 잔여재산의 분배를 받을 권리가 있다. 보통주식에 대한 잔여재산 분배율이 종류주식에 대한 잔여재산 분배율을 초과하는 경우 종류주식은 그 초과분에 대하여 보통주식과 동일한 분배율로 참가하여 분배를 받는다.", "charter": "", "_raw": {"text_blocks": ["회사의 배당정책은 적정한 이익분배를 통한 기업가치 극대화를 목표로 하고 있으며,주주들의 배당에 대한 기대에 부응할 수 있는 안정된 배당정책을 유지하기 위하여 최선을 다하고 있습니다. 매 사업연도 종료 후 법률 상 배당가능이익과 주식의 시장가치 및 동종 업체의 배당규모, 당사 Cashflow 상황 등을 종합적으로 고려하여 적정한 배당이 이루어질 수 있도록 노력하고 있습니다.", "구 분", "내          용", "종류주식의 배당", "제9조의2(이익배당 또는 잔여재산분배에 관한 종류주식) ① 회사는 이익배당 또는 잔여재산분배에 관한 종류주식(이하 이 조에서 '종류주식'이라 한다)을 발행할 수 있다.", "② 종류주식의 발행한도는 제5조의 발행예정주식총수의 1/4로 한다.", "③ 종류주식에 대하여는 우선배당 한다. 종류주식에 대한 우선배당은 1주의 금액 기준 연 1% 이상으로 발행시에 이사회가 정한 배당률에 따라현금으로 지급한다.", "④ 종류주식에 대하여 제3항에 따른 배당을 하고 보통주식에 대하여 종류주식의 배당률과 동률의 배당을 한 후, 잔여배당가능이익이 있으면 보통주식과 종류주식에 대하여 동등한 비율로 배당한다.", "⑤ 종류주식에 대하여 제3항에 따른 배당을 하지 못한 사업연도가 있을 경우에는 미배당분을 누적하여 다음 사업연도의 배당시에 우선하여 배당한다.", "⑥ 회사가 청산하는 경우 종류주식은 잔여재산분배에 대하여 종류주식발행총액과 미지급된 배당금을 합한 금액의 한도에서 보통주식에 우선하여 잔여재산의 분배를 받을 권리가 있다. 보통주식에 대한 잔여재산 분배율이 종류주식에 대한 잔여재산 분배율을 초과하는 경우 종류주식은 그 초과분에 대하여 보통주식과 동일한 분배율로 참가하여 분배를 받는다.", "이익금의 처분", "제51조(이익금의 처분) 회사는 매사업연도의 처분전 이익잉여금을 다음과 같이 처분한다. 1. 이익준비금 2. 기타의 법정준비금 3. 배당금 4. 임의적립금 5. 기타의 이익잉여금처분액", "이익배당", "제52조(이익배당) ①이익배당은 금전 또는 금전 외의 재산으로 할 수 있다. ②제1항의 배당은 매결산기말 현재의 주주명부에 기재된 주주 또는 등록된 질권자에게 지급한다.", "2) 배당에 관한 회사의 정책 당사는 배당가능이익 범위내에서 회사의 지속적인 성장을 의 배당 시에 전보하지 아니한다. ⑤ 회사가 유무상증자 또는 주식배당을 하는 경우 종류주식에 대한 신주의 배정은 유상증자 및 주식배당의 경우에는 보통주식에 배정하는 주식과 동일한 주식으로, 무상증자의 경우에는 그와 같은 종류의 주식으로 한다. ⑥ 종류주식에 대하여 소정의 배당을 하지 아니한다는 결의가 있는 경우에는 그 결의가있는 총회의 다음 총회부터 그 우선적 배당을 한다는 결의가 있는 총회의 종료 시까지는 의결권이 있는 것으로 한다. 제47조(이익배당) ① 이익의 배당은 금전과 주식 및 기타의 재산으로 할 수 있다. 다만, 주식에 의한 배당은 이익배당 총액의 2 분의 1 에 상당하는 금액을 초과하지 못한다. ② 이익의 배당을 주식으로 하는 경우 회사가 종류주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다. ③ 제 1 항의 배당은 매결산기말 현재의 주주명부에 기재된 주주 또는 등록된 질권자에게 지급하되 정기주주총회의 승인이 있는 날로부터 1 월 이내에 지급하여야 한다. 다만, 정기주주총회에서 배당금의 지급시기를 따로 정한 경우에는 그러하지 아니한다. ④ 회사는 사업연도 중 1 회에 한하여 이사회의 결의로 일정한 기준일을 정하여 그 기준일 현재의 주주명부에 기재된 주주 또는 등록된 질권자에게 금전으로 이익(이를 “중간배당”이라 한다)을 배당할 수 있다. ⑤ 배당금지급청구권은 5 년간 행사하지 아니하면 소멸시효가 완성되고 그 배당금은 회사에 귀속된다."]], "nh": 1}], "policy_text": "가. 배당 목표 결정시 사용하는 재무지표 및 산출방법 당사는 상법에 따른 배당가능이익을 산출하고 정관 제47조에 의거하여 이익배당 한도 내에서 배당 여부 및 배당 규모를 결정하고 있습니다. 당사의 배당은 당사를 100% 소유하고 있는 모회사 한국투자금융지주의 배당규모, 배당성향, 주주환원 정책 등에 영향을 미치고 있으며, 배당 규모를 결정할 때 그룹 전체의 성장을 위한 적절한 자원의 안배를 전제로 하고 있습니다. 이에 당사는 자회사로부터의 배당수입규모, 자본건전성 확보를 위한 필요유지자기자본 등을 기초로 회사의 재무상태, 경영 환경 등을 고려하여 배당 규모를 결정하고 있습니다.\n\n나. 향후 배당 수준의 방향성 당사는 정관에 의거 이사회 결의를 통하여 배당을 실시하고 있습니다. 배당가능이익 범위 내에서 회사의 지속적 성장을 위한 투자 및 경영환경 등을 고려하여 주주가치 제고를 위한 적정수준의 배당률을 결정합니다. 당사는 꾸준히 현금배당을 통한 주주환원을 시행해 왔으며, 향후에도 지속적으로 안정적인 배당을 지급하기 위해 노력해 나아갈 예정입니다. 추가로, 공시일 현재 당사의 자사주 매입 및 소각 관련 계획은 없습니다.\n\n다. 배당 제한 관련 정책 당사의 배당 정책은 경기 불확실성 및 규제환경, 회사의 경영상의 목적, 기타 재무적 상황 등에 따라 변동 될 수 있습니다.\n\n3. 기타 참고사항(배당 관련 정관의 내용 등) 당사는 배당에 대하여 정관 제8조의2, 제47조에 다음과 같이 규정하고 있습니다.\n\n주1) 제54기 현금배당금총액에는 중간배당금 1조 2,000억원(2025.12.30 실시)이 포함되었으며, 주당 현금배당금은 해당연도 현금배당금총액 1조 8,200억원을 기말 발행주식 총수로 나누어 산정 주2) (연결)당기순이익은 지배기업주주지분순이익으로 기재 주3) 당사는 주권비상장법인임에 따라 현금배당수익률을 기재하지 않음", "charter": "", "_raw": {"text_blocks": ["가. 배당 목표 결정시 사용하는 재무지표 및 산출방법 당사는 상법에 따른 배당가능이익을 산출하고 정관 제47조에 의거하여 이익배당 한도 내에서 배당 여부 및 배당 규모를 결정하고 있습니다. 당사의 배당은 당사를 100% 소유하고 있는 모회사 한국투자금융지주의 배당규모, 배당성향, 주주환원 정책 등에 영향을 미치고 있으며, 배당 규모를 결정할 때 그룹 전체의 성장을 위한 적절한 자원의 안배를 전제로 하고 있습니다. 이에 당사는 자회사로부터의 배당수입규모, 자본건전성 확보를 위한 필요유  '기업가치제고계획'을 공시하였습니다. 이에 따라 당사는 투자 실적 및 잉여현금흐름을 고려한 안정적인 주주환원을 시행할 것이며, 배당 예측가능성을 제고하기 위해 2027년까지 주당 최소배당금(주당 350원 / 2024년 현금배당 기준)을 설정하고 배당을 시행하고자 합니다.\n\n② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다.\n\n③ 회사는 이사회 결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 그 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다.\n\n① 이 회사는 영업연도 중 1회에 한하여 이사회의 결의로 일정한 날을 정하여 그 날의 주주에게 상법 제462조의3에 의한 중간배당을 할 수 있다.\n\n② 중간배당은 직전결산기의 대차대조표상의 순자산액에서 다음 각호의 금액을 공제한 액을 한도로 한다.", "charter": "", "_raw": {"text_blocks": ["(1) 배당 목표 결정시 사용하는 재무지표 및 산출방법 당사는 주주환원 정책의 일환으로 매년 일정 수준의 배당을 실시하고 있습니다. 당사는 정관에 의거 이사회 결의 및 주주총회 결의를 통하여 배당을 지급하고  있으며 배당가능이익 범위 내에서 회사의 지속적 성장을 위한 투자 및 주주가치 제고, 경영환경 등을 고려하여 적정수준의 배당률을 결정하고 있습니다.", "(2) 향후 배당 수준의 방향성 당사는 한 단계 발전한 주주환원 정책을 시행하고자 2025년 6월 26일 '기업가치제고계획'을 공시하였습니다. 이에 따라 당사는 투자 실적 및 잉여현금흐름을 고려한 안정적인 주주환원을 시행할 것이며, 배당 예측가능성을 제고하기 위해 2027년까지 주당 최소배당금(주당 350원 / 2024년 현금배당 기준)을 설정하고 배당을 시행하고자 합니다.", "해당 사항 없음", "제43조(이익금의 처분)", "이 회사는 매 사업년도의 처분전이익잉여금을 다음과 같이 처분한다.", "제44조(이익배당)", "① 이익의 배당은 금전과 주식 및 기타의 재산으로 할 수 있다.", "② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다.", "③ 회사는 이사회 결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 그 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다.", "제44조의 2(중간배당)", "① 이 회사는 영업연도 중 1회에 한하여 이사회의 결의로 일정한 날을 정하여 그 날의 주주에게 상법 제462조의3에 의한 중간배당을 할 수 있다.", "② 중간배당은 직전결산기의 대차대조표상의 순자산액에서 다음 각호의 금액을 공제한 액을 한도로 한다.", "5. 직전결산기까지 정관의 규정 또는 주주총회의 결의에 의하여 특정목적을 위해 적립한 임의준비금", "③ 사업년도개시일 이후 제1항의 기준일 이전에 신주를 발행한 경우(준비금의 자본전입, 주식배당, 전환사채의 전환청구, 신주인수권부사채의 신주인수권 행사의 경우를 포함한다)에는 중간배당에 관해서는 당해 신주는 직전사업년도말에 발행된 것으로 본다.", "제45조(배당금지급청구권의 소멸시효)", "① 배당금의 지급청구권은 5년간 이를 행사하지 아니하면 소멸시효가 완성한다.", "② 제1항의 시효의 완성으로 인한 배당금은 이 회사에 귀속한다."], "tables": [[["구분", "결산배당", "분기ㆍ중간배당"], ["정관상 배당액 결정 기관", "주주총회", "이사회"], ["정관상 배당기준일을 배당액 결정 이후로 정할 수 있는지 여부", "O", "O"], ["배당절차 개선방안 이행 관련 향후 계획", "-", "-"]], [["구분", "결산월", "배당여부", "배당액 확정일", "배당기준일", "배당 예측가능성 제공여부", "비고"], ["결산배당", "2024년 12월", "O", "2025년 02월 21일", "2024년 12월 31일", "X", "-"], ["결산배당", "2023년 12월", "O", "2024년 02월 23일", "2023년 12월 31일", "X", "-"], ["결산배당", "2022년 12월", "O", "2023년 02월 23일", "2022년 12월 31일", "X", "-"]], [["제43조(이익금의 처분) 이 회사는 매 사업년도의 처분전이익잉여금을 다음과 같이 처분한다. 1. 이익준비금 2. 기타의 법정적립금 3. 배당금 4. 임의적립금 5. 기타의 이익잉여금처분액 제44조(이익배당) ① 이익의 배당은 금전과 주식 및 기타의 재산으로 할 수 있다. ② 이익의 배당을 주식으로 하는 경우 회사가 수종의 주식을 발행한 때에는 주주총회의 결의로 그와 다른 종류의 주식으로도 할 수 있다. ③ 회사는 이사회 결의로 제1항의 배당을 받을 주주를 확정하기 위한 기준일을 정할 수 있으며, 그 기준일을 정한 경우 그 기준일의 2주 전에 이를 공고하여야 한다. 제44조의 2(중간배당) ① 이 회사는 영업연도 중 1회에 한하여 이사회의 결의로 일정한 날을 정하여 그 날의 주주에게 상법 제462조의3에 의한 중간배당을 할 수 있다. ② 중간배당은 직전결산기의 대차대조표상의 순자산액에서 다음 각호의 금액을 공제한 액을 한도로 한다. 1. 직전결산기의 자본금의 액 2. 직전결산기까지 적립된 자본준비금과 이익준비금의 합계액 3. 상법시행령에서 정하는 미실현이익 4. 직전결산기의 정기주주총회에서 이익배당하기로 정한 금액 5. 직전결산기까지 정관의 규정 또는 주주총회의 결의에 의하여 특정목적을 위해 적립한 임의준비금 6. 중간배당에 따라 당해 결산기에 적립하여야 할 이익준비금 ③ 사업년도개시일 이후 제1항의 기준일 이전에 신주를 발행한 경우(준비금의 자본전입, 주식배당, 전환사채의 전환청구, 신주인수권부사채의 신주인수권 행사의 경우를 포함한다)에는 중간배당에 관해서는 당해 신주는 직전사업년도말에 발행된 것으로 본다. 제45조(배당금지급청구권의 소멸시효) ① 배당금의 지급청구권은 5년간 이를 행사하지 아니하면 소멸시효가 완성한다. ② 제1항의 시효의 완성으로 인한 배당금은 이 회사에 귀속한다."]], [["구   분", "주식의 종류", "당기", "전기", "전전기"], ["제26기", "제25기", "제24기"], ["주당액면가액(원)", "5,000", "5,000", "5,000"], ["(연결)당기순이익(백만원)", "209,145", "445,379", "343,083"], ["(별도)당기순이익(백만원)", "367,039", "263,133", "96,003"], ["(연결)주당순이익(원)", "1,952", "2,422", "1,864"], ["현금배당금총액(백만원)", "93,497", "65,448", "52,358"], ["주식배당금총액(백만원)", "-", "-", "-"], ["(연결)현금배당성향(%)", "44.70", "14.69", "15.26"], ["현금배당수익률(%)", "보통주", "0.48", "1.60", "1.68"], ["종류주식", "-", "-", "-"], ["주식배당수익률(%)", "보통주", "-", "-", "-"], ["종류주식", "-", "-", "-"], ["주당 현금배당금(원)", "보통주", "500", "350", "280"], ["종류주식", "-", "-", "-"], ["주당 주식배당(주)", "보통주", "-", "-", "-"], ["종류주식", "-", "-", "-"]], [["주1)", "26기 현금배당수익률 배당 결정 이사회('26.02.20) 직전 5거래일('26.02.10~19) 최종시세가격의 산술평균가격으로 계산"]], [["", "(단위: 회, %)"]], [["연속 배당횟수", "평균 배당수익률"], ["분기(중간)배당", "결산배당", "최근 3년간", "최근 5년간"], ["-", "8", "1.25", "1.41"]], [["주1)", "연속 배당횟수의 결산배당은 2018년 ~ 2025년간의 횟수입니다."], ["주2)", "평균 배당수익률은 당사 상장 이후 기간에 대하여 기재하였습니다.   if(b===0&&a>0) return '<span class="dpill new" title="전기 0 → 당기 '+fp(cur)+' · 신규">신규</span>';
  const d=a-b; const dir=d>0?'up':(d<0?'dn':'flat'); const ar=d>0?'▲':(d<0?'▼':'–');
  const chg=(unit==='%')? ((d>0?'+':'')+d.toFixed(2)+'%p')
                        : ((d>0?'+':'')+(d/Math.abs(b)*100).toFixed(1)+'%');
  return '<span class="dpill '+dir+'" title="전기 '+fp(prev)+' → 당기 '+fp(cur)+' ('+chg+')">'+ar+' '+chg+'</span>';
}
function trendChip(vs){   // vs=[당기,전기,전전기] → 추세 칩
  const c=[num(vs[2]),num(vs[1]),num(vs[0])];   // 전전기,전기,당기
  if(c.filter(v=>v!=null).length<2) return '<span class="tchip t-flat">–</span>';
  const dir=(a,b)=>(a==null||b==null)?null:(a>b?1:(a<b?-1:0));
  const t1=dir(c[1],c[0]),t2=dir(c[2],c[1]),net=dir(c[2],c[0]);
  if(t1!=null&&t2!=null&&t1!==0&&t2!==0&&t1!==t2) return '<span class="tchip t-mix">〰 등락</span>';
  if(net>0) return '<span class="tchip t-up">▲ 상승</span>';
  if(net<0) return '<span class="tchip t-dn">▼ 하락</span>';
  return '<span class="tchip t-flat">— 유지</span>';
}
function genTable(grid){
  if(!grid||!grid.length)return '<p class="muted">—</p>';
  let h='<div class="gt"><table>';
  grid.forEach((row,ri)=>{h+='<tr>';row.forEach((c,ci)=>{const tag=ri===0?'th':'td';const cls=ci<2?' class="l"':'';h+='<'+tag+cls+'>'+esc(c)+'</'+tag+'>';});h+='</tr>';});
  return h+'</table></div>';
}
function render(){
  const r=D[idx];
  document.getElementById('stkname').textContent=r.company;
  document.getElementById('stkmeta').textContent=r.report_kind+' · '+r.fiscal_year;
  const per=r.periods, P=['당기','전기','전전기'];
  const avail=sharesAvail(r);
  let h='';
  // A header
  h+='<div class="A"><span class="t">배당</span>'+
     (r.dividend?'<span class="badge b-pay">● 배당 실시</span>':'<span class="badge b-nopay">○ 무배당</span>')+
     '<span class="prov">기준 '+esc(r.fiscal_year)+' · '+esc(r.report_kind)+(r.source==='mhtml'?' · DART 원문':'')+
     ' <button class="srcbtn" onclick="document.getElementById(\'rawd\').open=true;document.getElementById(\'rawd\').scrollIntoView({behavior:\'smooth\'})">공시 원문 보기</button></span></div>';
  h+='<div class="body">';

  // B 핵심지표
  h+='<div class="block"><div class="blocklabel">핵심 지표 · '+esc(per[0])+'<span class="rel">(당기)</span>';
  if(avail.length) h+='<span class="sharetoggle" id="shtoggle"></span>';
  h+='<span class="ln" style="display:none"></span></div>';
  if(!r.dividend){
    h+='<div class="nopaybox"><b>당기 무배당</b><br>당기 사업연도에 현금·주식 배당을 실시하지 않았습니다. 과거 이력은 아래 참고.</div>';
  }else{
    h+='<div class="kpilegend">당기 '+esc(per[0])+' 기준 · 색 배지 = <b>전기 대비 변화</b></div>';
    h+='<div class="kpis">';
    KCARD.forEach(([k,lab,unit])=>{
      const vm=val(r,k,share)||{};
      const cur=vm[per[0]], prev=vm[per[1]];
      const isYield=(k==='cash_yield'), isMil=(unit==='백만원'), has=(cur&&cur!=='-');
      const isSingle=!!(r.metrics_by_share[k]&&r.metrics_by_share[k]['단일']);
      const showCo=isSingle&&avail.length>0;   // 종류 토글이 있는 회사면 두 모드 모두 표시
      const vHtml=has?(isMil?esc(readMil(cur)):esc(cur)+'<span class="u">'+unit+'</span>'):'<span class="null">–</span>';
      h+='<div class="kpi"><div class="k">'+lab+(isYield?'<span class="tagq">공시기준</span>':'')+(showCo?'<span class="tagc">공통</span>':'')+'</div>'+
         '<div class="v">'+vHtml+'</div>'+
         '<div class="d">'+deltaPill(cur,prev,unit)+'</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';

  // C 추이 (값/변화율 토글 + 추세 칩)
  h+='<div class="block"><div class="blocklabel">3기 추이'+
     '<span class="cmode" id="cmode"><button data-m="val" class="'+(trendMode==='val'?'on':'')+'">값</button>'+
     '<button data-m="rate" class="'+(trendMode==='rate'?'on':'')+'">변화율</button></span></div>';
  h+='<table class="trend"><tr><th class="l">지표</th><th>'+P[0]+' <span class="rel">'+esc(per[0])+'</span></th><th>'+P[1]+' <span class="rel">'+esc(per[1])+'</span></th><th>'+P[2]+' <span class="rel">'+esc(per[2])+'</span></th><th>추이</th></tr>';
  KTREND.forEach(([k,lab,unit])=>{
    const vm=val(r,k,share)||{}; const raw=[vm[per[0]],vm[per[1]],vm[per[2]]]; const nums=raw.map(num);
    const isPct=(unit==='%'), isMil=(unit==='백만원');
    let cells;
    if(trendMode==='val'){
      cells=raw.map(v=>'<td>'+(v&&v!=='-'?(isMil?esc(readMil(v)):esc(v)):'<span class="null">–</span>')+'</td>').join('');
    }else{
      const diff=(c,p)=>(c==null||p==null)?null:(isPct?(c-p):(p!==0?(c-p)/Math.abs(p)*100:null));
      const fmt=c=>c==null?'<span class="null">–</span>':'<span class="'+(c>=0?'cup':'cdn')+'">'+((c>0?'+':'')+(isPct?c.toFixed(2)+'%p':c.toFixed(1)+'%'))+'</span>';
      cells='<td>'+fmt(diff(nums[0],nums[1]))+'</td><td>'+fmt(diff(nums[1],nums[2]))+'</td><td><span class="muted">기준</span></td>';
    }
    h+='<tr><td class="l">'+lab+' <span class="muted">('+(isMil?'원':unit)+')</span></td>'+cells+'<td>'+trendChip(raw)+'</td></tr>';
  });
  h+='</table></div>';

  // D 과거 배당 이력
  h+='<div class="block"><div class="blocklabel">과거 배당 이력<span class="ln"></span></div>';
  if(r.history&&r.history.grid) h+=genTable(r.history.grid);
  else if(r.history_note) h+='<div class="txt">'+esc(r.history_note)+'</div>';
  else h+='<p class="muted">과거 배당 이력 정보 없음.</p>';
  h+='</div>';

  // E 예측가능성 (접힘)
  if(r.extra_tables&&r.extra_tables.length){
    h+='<details><summary><span class="chev">▶</span>배당 예측가능성 (배당기준일·절차 개선방안)</summary>';
    r.extra_tables.forEach(e=>{h+='<div class="rawnote">'+esc(e.kind)+'</div>'+genTable(e.grid);});
    h+='</details>';
  }
  // F 정책·정관 (접힘)
  if(r.policy_text||r.charter){
    h+='<details><summary><span class="chev">▶</span>배당정책 · 정관</summary>';
    if(r.policy_text) h+='<div class="rawnote">배당정책</div><div class="txt">'+esc(r.policy_text)+'</div>';
    if(r.charter) h+='<div class="rawnote" style="margin-top:8px">정관 조항</div><div class="txt">'+esc(r.charter)+'</div>';
    h+='</details>';
  }
  // G 원문 추적
  h+='<details id="rawd"><summary><span class="chev">▶</span>공시 원문 (추적용)</summary>'+
     '<div class="rawnote">'+esc(r.section_path||'')+' — 위 수치는 모두 이 원문에서 추출됨</div>';
  (r._raw.text_blocks||[]).forEach(t=>{h+='<div class="txt">'+esc(t)+'</div>';});
  (r._raw.tables||[]).forEach(g=>{h+=genTable(g);});
  h+='</details>';

  h+='</div>';
  document.getElementById('sec').innerHTML=h;
  // share toggle
  if(avail.length){
    const box=document.getElementById('shtoggle');
    const opts=['보통주',...avail];
    box.innerHTML=opts.map(o=>'<button class="'+(o===share?'on':'')+'" data-s="'+esc(o)+'">'+esc(o)+'</button>').join('');
    box.querySelectorAll('button').forEach(b=>b.onclick=()=>{share=b.dataset.s;render();});
  }
  const cm=document.getElementById('cmode');
  if(cm) cm.querySelectorAll('button').forEach(b=>b.onclick=()=>{trendMode=b.dataset.m;render();});
}
buildSel();render();
</script>
</body></html>
